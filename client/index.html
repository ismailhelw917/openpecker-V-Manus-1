<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    
    <!-- Primary Meta Tags -->
    <title>OpenPecker - Master Chess Openings Through Deliberate Repetition</title>
    <meta name="title" content="OpenPecker - Master Chess Openings Through Deliberate Repetition" />
    <meta name="description" content="Train chess openings with the Woodpecker method. Solve thousands of puzzles, track your progress, and master opening tactics through spaced repetition." />
    <meta name="keywords" content="chess training, opening puzzles, chess tactics, spaced repetition, Woodpecker method, chess improvement" />
    <meta name="author" content="OpenPecker" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="OpenPecker - Master Chess Openings" />
    <meta property="og:description" content="Train chess openings with thousands of puzzles and track your progress with detailed analytics." />
    <meta property="og:site_name" content="OpenPecker" />
    <meta property="og:locale" content="en_US" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="OpenPecker - Master Chess Openings" />
    <meta property="twitter:description" content="Train chess openings with thousands of puzzles and track your progress." />
    
    <!-- Additional Meta Tags -->
    <meta name="theme-color" content="#1e293b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="OpenPecker" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://openpecker.manus.space/" />
    
    <!-- Preconnect to external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "OpenPecker",
      "description": "Master chess openings through deliberate repetition with thousands of puzzles",
      "url": "https://openpecker.manus.space",
      "applicationCategory": "GameApplication",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "author": {
        "@type": "Organization",
        "name": "OpenPecker"
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
